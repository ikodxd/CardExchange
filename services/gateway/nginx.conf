upstream auth          { server auth:8001; }
upstream cards         { server cards:8002; }
upstream trades        { server trades:8003; }
upstream notifications { server notifications:8004; }

server {
    listen 80;
    client_max_body_size 10M;

    # ── WebSocket (must come first) ───────────────────────────────
    location /ws {
        proxy_pass         http://notifications;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
    }

    # ── Auth + Users API ──────────────────────────────────────────
    location /auth/         { proxy_pass http://auth; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /users/        { proxy_pass http://auth; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    # ── Admin: cards moderation (more specific must come first) ───
    location /api/admin/cards/ {
        proxy_pass http://cards;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Admin: user role management ───────────────────────────────
    location /api/admin/ {
        proxy_pass http://auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Cards API (includes /cards/uploads/ static pass-through) ──
    location /cards/ {
        proxy_pass http://cards;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Trades API ────────────────────────────────────────────────
    location /trades/ {
        proxy_pass http://trades;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Frontend SPA ──────────────────────────────────────────────
    location / {
        root       /usr/share/nginx/html;
        try_files  $uri /index.html;
    }
}
