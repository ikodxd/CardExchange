services:

  # ── Gateway (nginx) ───────────────────────────────────────────
  gateway:
    image: nginx:1.27-alpine
    container_name: ce-gateway
    ports:
      - "8000:80"
    volumes:
      - ./services/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - auth
      - cards
      - trades
      - notifications

  # ── Auth Service ──────────────────────────────────────────────
  auth:
    build: ./services/auth
    container_name: ce-auth
    env_file: .env
    volumes:
      - auth_data:/app/data
    expose:
      - "8001"

  # ── Cards Service ─────────────────────────────────────────────
  cards:
    build: ./services/cards
    container_name: ce-cards
    env_file: .env
    volumes:
      - cards_data:/app/data
    expose:
      - "8002"

  # ── Trades Service ────────────────────────────────────────────
  trades:
    build: ./services/trades
    container_name: ce-trades
    env_file: .env
    depends_on:
      - redis
      - auth
      - cards
    expose:
      - "8003"

  # ── Notifications Service ─────────────────────────────────────
  notifications:
    build: ./services/notifications
    container_name: ce-notifications
    env_file: .env
    depends_on:
      - redis
    expose:
      - "8004"

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ce-redis
    volumes:
      - redis_data:/data

volumes:
  auth_data:
  cards_data:
  redis_data:
